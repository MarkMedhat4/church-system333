<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>غير متصل — كنيسة الثلاثة فتية القديسين</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3a8a, #1e40af);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: white;
    }
    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #d97706;
      color: white;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #b45309; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>
      يرجى التحقق من اتصالك بالإنترنت والمحاولة مرة أخرى.
      بعض الميزات متاحة دون اتصال.
    </p>
    <button class="btn" onclick="window.location.reload()">
      🔄 إعادة المحاولة
    </button>
  </div>
</body>
</html>
